<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluid Size</title>
  <meta name="description" content="Generate fluid CSS clamp() values that scale any length between two viewports.">

  <meta property="og:title" content="Fluid Size — CSS clamp() generator">
  <meta property="og:description" content="Generate fluid CSS clamp() values that scale any length between two viewports.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="theme-color" content="#0b0b0d">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="topbar">
      <button class="wordmark" id="wordmark" type="button">Fluid Size</button>
      <span class="topbar-tag">css clamp()</span>
    </header>

    <main class="stage">
      <div class="panel">

        <div class="preview-stage">
          <span class="preview-text" id="previewText" contenteditable="true" spellcheck="false" role="textbox" aria-label="Preview text — click to edit" data-placeholder="Type text…"></span>
          <div class="preview-element" id="previewElement" hidden></div>
        </div>

        <div class="slider-block">
          <input type="range" class="range" id="viewportSlider" min="320" max="1440" step="1" value="880" aria-label="Preview viewport width">
          <div class="slider-labels">
            <span class="slider-meta">
              <span class="vp-field">viewport
                <input class="vp-input" id="viewportInput" type="text" value="880"
                       inputmode="text" autocomplete="off" autocapitalize="off"
                       spellcheck="false" aria-label="Viewport width — sets your default">
                <span class="vp-unit">px</span>
                <button type="button" class="vp-reset" id="viewportReset"
                        aria-label="Back to your default viewport" title="Back to your default" hidden>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
                    <path d="M3 3v5h5"/>
                  </svg>
                </button>
              </span>
              <span class="slider-sep">·</span>
              <span>rendered <span class="val" id="renderedLabel">—</span></span>
            </span>
            <div class="segs segmented--sm" role="group" aria-label="Preview mode">
              <button type="button" class="seg" data-mode="text" aria-pressed="true">Text</button>
              <button type="button" class="seg" data-mode="element" aria-pressed="false">Element</button>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="field-grid">
          <label class="field">
            <span class="field-label">Max size</span>
            <span class="field-input">
              <input class="num" type="text" id="maxSize" value="0" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Min size</span>
            <span class="field-input">
              <input class="num" type="text" id="minSize" value="0" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
        </div>

        <div class="field-grid field-grid--gap">
          <label class="field">
            <span class="field-label">Max breakpoint</span>
            <span class="field-input">
              <input class="num" type="text" id="maxBp" value="1440" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Min breakpoint</span>
            <span class="field-input">
              <input class="num" type="text" id="minBp" value="320" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
        </div>

        <div class="unit-toggle">
          <div class="segs" role="group" aria-label="Output unit">
            <button type="button" class="seg" data-unit="rem" aria-pressed="true">rem</button>
            <button type="button" class="seg" data-unit="px" aria-pressed="false">px</button>
          </div>
        </div>

        <p class="warn" id="warn" role="alert" hidden></p>

        <div class="output-row">
          <code class="output" id="output">clamp(...)</code>
          <div class="output-btns">
            <button type="button" class="btn-ghost" id="clearBtn">Clear</button>
            <button type="button" class="btn-primary copy-btn" id="copyBtn">Copy to Clipboard</button>
          </div>
          <p class="hint"><kbd>⌘/Ctrl</kbd>+<kbd>C</kbd> copy · <kbd>Esc</kbd> clear</p>
        </div>

      </div>
    </main>

    <footer class="footer">
      <span>Made with <span class="footer-heart">♥</span> by Alex Ghit</span>
      <span class="dot">·</span>
      <a class="footer-link" href="mailto:alex@hey5.studio">alex@hey5.studio</a>
      <span class="dot">·</span>
      <a class="footer-link" href="https://developer.mozilla.org/en-US/docs/Web/CSS/clamp" target="_blank" rel="noopener">clamp()</a>
      <span>generator</span>
      <span class="dot">·</span>
      <span class="footer-ver">v2.0</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
