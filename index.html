<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Convert</title>
<meta name="description" content="Convert fonts between TTF, OTF, WOFF and WOFF2 — fast, local, in your browser.">
<link rel="icon" href="/icons/favicon.ico" sizes="any">
<link rel="icon" href="/icons/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/icons/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<style>
  :root{
    --bg:#0a0a0a;--fg:#e8e8e8;--dim:#6a6a6a;--dimmer:#3a3a3a;
    --line:#242424;--field:#141414;--field-line:#2a2a2a;
    --accent:#f2f2f2;--accent-fg:#0a0a0a;--pill:#1c1c1c;--err:#e0a0a0;--ok:#9ad0a0;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--fg);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;min-height:100vh;
  }
  a{color:inherit}
  header{display:flex;justify-content:space-between;align-items:center;padding:28px 40px}
  .brand{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);
    background:none;border:0;font-family:inherit;cursor:pointer;padding:0;transition:color .18s}
  .brand:hover{color:var(--fg)}
  .mode{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
  main{
    flex:1;width:100%;max-width:640px;margin:0 auto;
    padding:40px 32px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;
  }

  /* drop / select */
  .drop{
    width:100%;border:1px dashed var(--field-line);border-radius:var(--radius);
    background:var(--field);padding:44px 24px;text-align:center;cursor:pointer;
    transition:border-color .2s,background .2s;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .drop:hover,.drop.over{border-color:#4a4a4a;background:#171717}
  .drop .big{font-size:15px;color:var(--fg);letter-spacing:.02em}
  .drop .small{font-size:12px;color:var(--dim)}
  input[type=file]{display:none}

  /* file list */
  .files{width:100%;margin-top:18px;display:flex;flex-direction:column;gap:8px}
  .file{
    display:flex;align-items:center;gap:12px;
    background:var(--field);border:1px solid var(--field-line);
    border-radius:10px;padding:12px 14px;font-size:13px;
  }
  .file .nm{flex:1;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file .tag{color:var(--dim);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .file .st{font-size:11px;letter-spacing:.04em}
  .file .st.ok{color:var(--ok)}
  .file .st.err{color:var(--err)}
  .file .st.wait{color:var(--dim)}
  .file .x{
    cursor:pointer;color:var(--dim);border:0;background:0;font:inherit;font-size:15px;
    padding:0 2px;line-height:1;
  }
  .file .x:hover{color:var(--fg)}

  /* format */
  .label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:40px 0 16px;text-align:center}
  .pills{display:inline-flex;background:var(--pill);border-radius:999px;padding:5px;gap:2px}
  .pill{
    border:0;background:transparent;color:var(--dim);cursor:pointer;font:inherit;
    font-size:13px;letter-spacing:.02em;padding:9px 20px;border-radius:999px;
    transition:background .18s,color .18s;
  }
  .pill:hover{color:var(--fg)}
  .pill[aria-pressed=true]{background:var(--accent);color:var(--accent-fg)}
  .pill:disabled{opacity:.32;cursor:not-allowed}

  /* actions */
  .actions{display:flex;gap:12px;margin-top:40px}
  .btn{
    border:1px solid var(--field-line);background:transparent;color:var(--fg);font:inherit;
    font-size:14px;letter-spacing:.02em;padding:14px 26px;border-radius:12px;cursor:pointer;
    transition:background .18s,border-color .18s,opacity .18s;
  }
  .btn:hover{background:#161616}
  .btn.primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
  .btn.primary:hover{background:#fff}
  .btn:disabled{opacity:.3;cursor:not-allowed}
  .btn.primary:disabled:hover{background:var(--accent)}

  .status{margin-top:14px;font-size:12px;letter-spacing:.03em;color:var(--dim);text-align:center;min-height:1.2em}
  .status.err{color:var(--err)}
  .hint{margin-top:12px;font-size:12px;color:var(--dimmer);letter-spacing:.03em;text-align:center}
  .hint kbd{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;padding:2px 6px;font:inherit;font-size:11px;color:var(--dim)}

  footer{padding:26px;text-align:center;font-size:12px;color:var(--dimmer);letter-spacing:.03em}
  footer a{color:var(--dim);text-decoration:underline;text-underline-offset:3px}

  @media (max-width:560px){
    header{padding:22px 20px}
    main{padding:40px 20px}
    .actions{flex-direction:column;width:100%}
    .btn{width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header>
    <button class="brand" id="brandReset" type="button">Font Convert</button>
    <span class="mode">Local convert</span>
  </header>

  <main>
    <label class="drop" id="drop" for="file">
      <span class="big" id="dropBig">Select or drop fonts</span>
      <span class="small">.ttf · .otf · .woff · .woff2 — one or many</span>
    </label>
    <input type="file" id="file" multiple
           accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2">

    <div class="files" id="files"></div>

    <div class="label">Convert to</div>
    <div class="pills" id="targets" role="group" aria-label="Output format">
      <button class="pill" data-t="ttf"   aria-pressed="false">TTF</button>
      <button class="pill" data-t="otf"   aria-pressed="false">OTF</button>
      <button class="pill" data-t="woff"  aria-pressed="false">WOFF</button>
      <button class="pill" data-t="woff2" aria-pressed="true">WOFF2</button>
    </div>

    <div class="actions">
      <button class="btn" id="convert" disabled>Convert</button>
      <button class="btn primary" id="download" disabled>Download</button>
    </div>

    <div class="status" id="status"></div>
    <div class="hint"><kbd>Esc</kbd> clear</div>
  </main>

  <footer>
    Made with ♥ by Alex Ghit · <a href="https://github.com/google/woff2">woff2</a> by Google (MIT) · v1.0
  </footer>

<script type="module">
import { initCompress }   from "./lib/woff2-compress.js";
import { initDecompress } from "./lib/woff2-decompress.js";
let _c=null,_d=null;
async function woff2Compress(b){ _c ??= await initCompress();   return _c(b); }
async function woff2Decompress(b){ _d ??= await initDecompress(); return _d(b); }

const $=id=>document.getElementById(id);
const fileInput=$("file"),drop=$("drop"),dropBig=$("dropBig"),filesEl=$("files"),
      status=$("status"),convertBtn=$("convert"),downloadBtn=$("download"),
      brandReset=$("brandReset");

let target="woff2";
let items=[];   // {file, name, base, inFmt, sfnt, flavor, out, outFmt, state, msg}
let converted=false;

/* ---- byte helpers ---- */
const u32=(v,o)=>((v[o]<<24)|(v[o+1]<<16)|(v[o+2]<<8)|v[o+3])>>>0;
const u16=(v,o)=>((v[o]<<8)|v[o+1]);
const sU32=(v,o,n)=>{v[o]=(n>>>24)&255;v[o+1]=(n>>>16)&255;v[o+2]=(n>>>8)&255;v[o+3]=n&255;};
const sU16=(v,o,n)=>{v[o]=(n>>>8)&255;v[o+1]=n&255;};
const pad4=n=>(n+3)&~3;
async function deflate(b){const cs=new CompressionStream("deflate");const w=cs.writable.getWriter();w.write(b);w.close();return new Uint8Array(await new Response(cs.readable).arrayBuffer());}
async function inflate(b){const ds=new DecompressionStream("deflate");const w=ds.writable.getWriter();w.write(b);w.close();return new Uint8Array(await new Response(ds.readable).arrayBuffer());}
function detect(v){const t=u32(v,0);
  if(t===0x774F4632)return"woff2";if(t===0x774F4646)return"woff";
  if(t===0x4F54544F)return"otf";if(t===0x00010000||t===0x74727565)return"ttf";return null;}
const flavorOf=v=>(u32(v,0)===0x4F54544F?"otf":"ttf");

async function woffToSfnt(v){
  const num=u16(v,12),flavor=u32(v,4);const e=[];let p=44;
  for(let i=0;i<num;i++){e.push({tag:u32(v,p),offset:u32(v,p+4),compLen:u32(v,p+8),origLen:u32(v,p+12)});p+=20;}
  let sr=1,es=0;while(sr*2<=num){sr*=2;es++;}sr*=16;const rs=num*16-sr;
  for(const t of e){const raw=v.subarray(t.offset,t.offset+t.compLen);t.data=(t.compLen<t.origLen)?await inflate(raw):raw.slice();}
  let off=12+num*16;for(const t of e){t.newOffset=off;off+=pad4(t.origLen);}
  const out=new Uint8Array(off);sU32(out,0,flavor);sU16(out,4,num);sU16(out,6,sr);sU16(out,8,es);sU16(out,10,rs);
  let d=12;for(const t of e){sU32(out,d,t.tag);sU32(out,d+4,0);sU32(out,d+8,t.newOffset);sU32(out,d+12,t.origLen);d+=16;out.set(t.data,t.newOffset);}
  return out;
}
async function sfntToWoff(v){
  const flavor=u32(v,0),count=u16(v,4),dir=[];let p=12;
  for(let i=0;i<count;i++){dir.push({tag:u32(v,p),checksum:u32(v,p+4),offset:u32(v,p+8),length:u32(v,p+12)});p+=16;}
  let off=44+count*20;const parts=[];
  for(const t of dir){const orig=v.subarray(t.offset,t.offset+t.length);const comp=await deflate(orig);
    const use=comp.length<t.length;t.comp=use?comp:orig;t.compLen=t.comp.length;t.origLen=t.length;t.newOffset=off;parts.push(t);off+=pad4(t.compLen);}
  const out=new Uint8Array(off);
  sU32(out,0,0x774F4646);sU32(out,4,flavor);sU32(out,8,off);sU16(out,12,count);sU16(out,14,0);
  sU32(out,16,v.length);sU16(out,20,1);sU16(out,22,0);sU32(out,24,0);sU32(out,28,0);sU32(out,32,0);sU32(out,36,0);sU32(out,40,0);
  let d=44;for(const t of parts){sU32(out,d,t.tag);sU32(out,d+4,t.newOffset);sU32(out,d+8,t.compLen);sU32(out,d+12,t.origLen);sU32(out,d+16,t.checksum);d+=20;out.set(t.comp,t.newOffset);}
  return out;
}
async function toSfnt(v,fmt){
  if(fmt==="ttf"||fmt==="otf")return v;
  if(fmt==="woff")return await woffToSfnt(v);
  if(fmt==="woff2")return new Uint8Array(await woff2Decompress(v));
  throw new Error("unsupported input");
}
async function fromSfnt(v,tgt){
  if(tgt==="ttf"||tgt==="otf")return v;
  if(tgt==="woff")return await sfntToWoff(v);
  if(tgt==="woff2")return new Uint8Array(await woff2Compress(v));
  throw new Error("unsupported output");
}

/* ---- UI ---- */
function selectTarget(t){
  target=t;converted=false;
  document.querySelectorAll(".pill").forEach(b=>b.setAttribute("aria-pressed",b.dataset.t===t?"true":"false"));
  items.forEach(it=>{it.out=null;it.state=it.sfnt?"ready":it.state;it.msg="";});
  refreshTargets();render();updateButtons();showStatus("");
}
function refreshTargets(){
  // enable ttf only if some source is truetype, otf only if some is cff; always allow woff/woff2
  const hasTTF=items.some(i=>i.flavor==="ttf");
  const hasOTF=items.some(i=>i.flavor==="otf");
  document.querySelectorAll(".pill").forEach(b=>{
    const t=b.dataset.t;let dis=false;
    if(items.length){ if(t==="ttf")dis=!hasTTF; if(t==="otf")dis=!hasOTF; }
    b.disabled=dis;
  });
  if((target==="ttf"&&!hasTTF)||(target==="otf"&&!hasOTF)) if(items.length) selectTarget("woff2");
}
function showStatus(m,err){status.textContent=m||"";status.classList.toggle("err",!!err);}
function render(){
  filesEl.innerHTML="";
  items.forEach((it,i)=>{
    const row=document.createElement("div");row.className="file";
    let st="",cls="";
    if(it.state==="baderr"){st="unreadable";cls="err";}
    else if(it.state==="fail"){st="failed";cls="err";}
    else if(it.state==="done"){st="→ "+it.outFmt.toUpperCase();cls="ok";}
    else if(it.state==="skip"){st=it.msg;cls="err";}
    else{st="ready";cls="wait";}
    row.innerHTML=`<span class="tag">${it.inFmt?it.inFmt:"?"}</span>
      <span class="nm">${it.name}</span>
      <span class="st ${cls}">${st}</span>
      <button class="x" title="remove" data-i="${i}">✕</button>`;
    filesEl.appendChild(row);
  });
  filesEl.querySelectorAll(".x").forEach(b=>b.addEventListener("click",e=>{
    e.preventDefault();remove(+b.dataset.i);
  }));
  dropBig.textContent=items.length?`${items.length} font${items.length>1?"s":""} selected`:"Select or drop fonts";
}
function updateButtons(){
  const anyReady=items.some(i=>i.sfnt&&i.state!=="skip");
  convertBtn.disabled=!anyReady||converted;
  downloadBtn.disabled=!converted||!items.some(i=>i.state==="done");
}
function remove(i){items.splice(i,1);converted=false;refreshTargets();render();updateButtons();showStatus("");}

async function addFiles(list){
  for(const file of list){
    const buf=new Uint8Array(await file.arrayBuffer());
    const inFmt=detect(buf);
    const base=file.name.replace(/\.(ttf|otf|woff2?|TTF|OTF|WOFF2?)$/,"")||"font";
    const it={file,name:file.name,base,inFmt,sfnt:null,flavor:null,out:null,outFmt:null,state:"wait",msg:""};
    if(!inFmt){it.state="baderr";items.push(it);continue;}
    try{ it.sfnt=await toSfnt(buf,inFmt); it.flavor=flavorOf(it.sfnt); it.state="ready"; }
    catch(e){ console.error(e); it.state="baderr"; }
    items.push(it);
  }
  converted=false;refreshTargets();render();updateButtons();showStatus("");
}

async function convertAll(){
  converted=false;convertBtn.disabled=true;showStatus("Converting…");
  let ok=0,fail=0;
  for(const it of items){
    if(!it.sfnt){fail++;continue;}
    // skip impossible outline conversions
    if((target==="ttf"&&it.flavor!=="ttf")||(target==="otf"&&it.flavor!=="otf")){
      it.state="skip";it.msg="can't → "+target.toUpperCase();fail++;continue;
    }
    try{
      it.out=await fromSfnt(it.sfnt,target);it.outFmt=target;it.state="done";ok++;
    }catch(e){console.error(e);it.state="fail";fail++;}
  }
  converted=true;render();updateButtons();
  showStatus(fail? `${ok} converted, ${fail} skipped/failed` : `${ok} font${ok>1?"s":""} converted — ready to download`, fail&&!ok);
}

function saveBlob(bytes,name,mime){
  const b=new Blob([bytes],{type:mime});const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
}
const mimeOf=f=>f==="woff2"?"font/woff2":f==="woff"?"font/woff":f==="otf"?"font/otf":"font/ttf";

async function downloadAll(){
  const done=items.filter(i=>i.state==="done"&&i.out);
  if(!done.length)return;
  if(done.length===1){
    const it=done[0];saveBlob(it.out,`${it.base}.${it.outFmt}`,mimeOf(it.outFmt));
    showStatus(`Downloaded ${it.base}.${it.outFmt}`);return;
  }
  // multiple → zip (store, no compression — fonts are already compressed)
  const zip=makeZip(done.map(it=>({name:`${it.base}.${it.outFmt}`,data:it.out})));
  saveBlob(zip,"fonts.zip","application/zip");
  showStatus(`Downloaded fonts.zip (${done.length} files)`);
}

/* ---- tiny ZIP writer (store method, no deps) ---- */
function crc32(buf){
  let c,crc=0xFFFFFFFF;
  if(!crc32.t){crc32.t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);crc32.t[n]=c;}}
  for(let i=0;i<buf.length;i++)crc=crc32.t[(crc^buf[i])&0xFF]^(crc>>>8);
  return (crc^0xFFFFFFFF)>>>0;
}
function makeZip(files){
  const enc=new TextEncoder();const chunks=[];const central=[];let offset=0;
  const push=arr=>{chunks.push(arr);offset+=arr.length;};
  const w16=n=>{const a=new Uint8Array(2);a[0]=n&255;a[1]=(n>>8)&255;return a;};
  const w32=n=>{const a=new Uint8Array(4);a[0]=n&255;a[1]=(n>>8)&255;a[2]=(n>>16)&255;a[3]=(n>>24)&255;return a;};
  for(const f of files){
    const name=enc.encode(f.name);const data=f.data;const crc=crc32(data);const lho=offset;
    push(w32(0x04034b50));push(w16(20));push(w16(0));push(w16(0));push(w16(0));push(w16(0));
    push(w32(crc));push(w32(data.length));push(w32(data.length));push(w16(name.length));push(w16(0));
    push(name);push(data);
    central.push({name,crc,size:data.length,lho});
  }
  const cds=offset;
  for(const c of central){
    push(w32(0x02014b50));push(w16(20));push(w16(20));push(w16(0));push(w16(0));push(w16(0));push(w16(0));
    push(w32(c.crc));push(w32(c.size));push(w32(c.size));push(w16(c.name.length));push(w16(0));push(w16(0));
    push(w16(0));push(w16(0));push(w32(0));push(w32(c.lho));push(c.name);
  }
  const cdsize=offset-cds;
  push(w32(0x06054b50));push(w16(0));push(w16(0));push(w16(central.length));push(w16(central.length));
  push(w32(cdsize));push(w32(cds));push(w16(0));
  let total=0;for(const c of chunks)total+=c.length;
  const out=new Uint8Array(total);let p=0;for(const c of chunks){out.set(c,p);p+=c.length;}
  return out;
}

function reset(){
  items=[];converted=false;fileInput.value="";
  refreshTargets();render();updateButtons();showStatus("");
}

/* events */
fileInput.addEventListener("change",e=>{if(e.target.files.length)addFiles([...e.target.files]);});
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",e=>{if(e.dataTransfer.files.length)addFiles([...e.dataTransfer.files]);});
document.querySelectorAll(".pill").forEach(b=>b.addEventListener("click",()=>{if(!b.disabled)selectTarget(b.dataset.t);}));
brandReset.addEventListener("click",reset);
convertBtn.addEventListener("click",convertAll);
downloadBtn.addEventListener("click",downloadAll);
document.addEventListener("keydown",e=>{if(e.key==="Escape")reset();});
</script>
</body>
</html>
